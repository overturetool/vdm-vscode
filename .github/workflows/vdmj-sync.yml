# (Removed misplaced cleanup step)
name: Sync VDMJ Jars

on:
    # schedule:
    #     - cron: '0 * * * *' # every hour
    workflow_dispatch:

jobs:
    sync-vdmj:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: development

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.x'

            - name: Get latest VDMJ release info
              id: vdmj_release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/nickbattle/vdmj/releases/latest -o release.json
                  cat release.json
                  if jq -e .assets release.json > /dev/null; then
                    echo "Assets found."
                  else
                    echo "Error: No assets found in release.json."
                    exit 1
                  fi
                  echo "::set-output name=tag::$(jq -r .tag_name release.json)"
                  echo "::set-output name=id::$(jq -r .id release.json)"

            - name: Check if already synced
              id: check_synced
              run: |
                  if git ls-remote --exit-code --heads origin vdmj-${{ steps.vdmj_release.outputs.tag }}; then
                    echo "Already synced this release."
                    echo "::set-output name=skip::true"
                  else
                    echo "::set-output name=skip::false"
                  fi

            - name: Exit if already synced
              if: steps.check_synced.outputs.skip == 'true' && github.event_name != 'workflow_dispatch'
              run: exit 0

            - name: Create new branch for VDMJ ${{ steps.vdmj_release.outputs.tag }}
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git checkout -b vdmj-${{ steps.vdmj_release.outputs.tag }}

            - name: Download release assets
              run: |
                  assets=$(jq -r '.assets[] | select(.name | endswith("-distribution.zip")) | .browser_download_url' release.json)
                  mkdir -p vdmj_zips
                  for url in $assets; do
                    fname=$(basename "$url")
                    curl -L "$url" -o "vdmj_zips/$fname"
                  done

            - name: Unpack and move jars
              run: |
                  mkdir -p resources/jars/vdmj resources/jars/vdmj_hp
                  for zip in vdmj_zips/*-distribution.zip; do
                    if [[ "$zip" == *-P-*.zip ]]; then
                      target=resources/jars/vdmj_hp
                    else
                      target=resources/jars/vdmj
                    fi
                    mkdir -p "$target/annotations" "$target/libs" "$target/plugins"
                    # Remove old jars with the same prefix
                    rm -f "$target"/vdmj-*.jar
                    rm -f "$target/annotations"/annotations-*.jar
                    rm -f "$target/libs"/stdlib-*.jar
                    rm -f "$target/plugins"/quickcheck-*.jar
                    tmpdir=$(mktemp -d)
                    unzip -o "$zip" -d "$tmpdir"
                    shopt -s nullglob
                    # Only move regular files, not directories
                    find "$tmpdir" -type f -name 'vdmj-*.jar' -exec mv {} "$target/" \;
                    find "$tmpdir" -type f -name 'annotations-*.jar' -exec mv {} "$target/annotations/" \;
                    find "$tmpdir" -type f -name 'stdlib-*.jar' -exec mv {} "$target/libs/" \;
                    find "$tmpdir" -type f -name 'quickcheck-*.jar' -exec mv {} "$target/plugins/" \;
                    rm -rf "$tmpdir"
                  done

            - name: Cleanup temp files
              run: |
                  rm -f release.json
                  rm -rf vdmj_zips/

            - name: Commit and push changes
              run: |
                  git add resources/jars/vdmj resources/jars/vdmj_hp
                  git commit -m "Sync VDMJ jars from release ${{ steps.vdmj_release.outputs.tag }}"
                  git push origin HEAD
